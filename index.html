<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speed Dial</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0c12;
    --surface: rgba(255,255,255,0.06);
    --surface-hover: rgba(255,255,255,0.10);
    --border: rgba(255,255,255,0.08);
    --text: #e8eaf0;
    --text-muted: #7a7f94;
    --accent: #d4853a;
    --accent2: #5b8dee;
    --radius: 18px;
    --icon-size: 72px;
    --gap: 18px;
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--bg);
    overflow: hidden;
  }

  /* ─── WALLPAPER ─── */
  #wallpaper {
    position: fixed; inset: 0; z-index: 0;
    background-image: var(--wp-url, none);
    background-size: cover;
    background-position: center;
    transition: opacity .4s;
  }
  #wallpaper::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(5,7,18,.55) 0%, rgba(5,7,18,.3) 40%, rgba(5,7,18,.7) 100%);
  }

  /* ─── LAYOUT ─── */
  #app {
    position: relative; z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── GRID AREA ─── */
  #grid-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px 16px;
    scrollbar-width: none;
  }
  #grid-wrap::-webkit-scrollbar { display: none; }

  #dial-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: var(--gap);
    max-width: 700px;
    margin: 0 auto;
  }

  /* ─── DIAL ITEM ─── */
  .dial-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    position: relative;
    user-select: none;
    -webkit-user-select: none;
  }

  .dial-icon {
    width: var(--icon-size);
    height: var(--icon-size);
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: transform .18s ease, box-shadow .18s ease, background .18s;
    position: relative;
    backdrop-filter: blur(12px);
  }
  .dial-item:hover .dial-icon {
    transform: scale(1.07);
    background: var(--surface-hover);
    box-shadow: 0 8px 30px rgba(0,0,0,.4);
  }
  .dial-item:active .dial-icon { transform: scale(.96); }

  .dial-icon img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: calc(var(--radius) - 2px);
  }

  .dial-icon .favicon {
    width: 44px; height: 44px;
    border-radius: 10px;
    object-fit: contain;
  }

  .dial-icon .emoji-icon {
    font-size: 32px;
    line-height: 1;
  }

  /* group 2x2 grid */
  .group-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 3px;
    width: 52px; height: 52px;
  }
  .group-grid-cell {
    border-radius: 6px;
    overflow: hidden;
    background: rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
  }
  .group-grid-cell img { width: 100%; height: 100%; object-fit: cover; }
  .group-grid-cell .cell-emoji { font-size: 13px; }
  .group-grid-cell .cell-letter {
    font-size: 11px; font-weight: 600;
    color: rgba(255,255,255,.7);
  }

  .dial-label {
    font-size: 11.5px;
    font-weight: 500;
    color: var(--text);
    text-align: center;
    max-width: 80px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 1px 6px rgba(0,0,0,.8);
  }

  /* + ADD button */
  .add-btn .dial-icon {
    background: rgba(255,255,255,0.07);
    border: 1.5px dashed rgba(255,255,255,0.2);
  }
  .add-btn .plus-icon {
    font-size: 30px;
    color: rgba(255,255,255,.45);
    font-weight: 300;
    line-height: 1;
  }
  .add-btn:hover .plus-icon { color: rgba(255,255,255,.8); }

  /* ─── VIEW TOGGLES ─── */
  #view-toggles {
    position: fixed;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 10;
  }
  .view-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background .15s;
    backdrop-filter: blur(10px);
  }
  .view-btn:hover, .view-btn.active { background: rgba(255,255,255,0.16); }
  .view-btn svg { width: 18px; height: 18px; fill: rgba(255,255,255,.6); }

  /* LIST VIEW */
  #dial-grid.list-view {
    grid-template-columns: 1fr;
    max-width: 500px;
  }
  #dial-grid.list-view .dial-item {
    flex-direction: row;
    gap: 14px;
    padding: 8px 12px;
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--border);
    backdrop-filter: blur(10px);
  }
  #dial-grid.list-view .dial-icon {
    width: 44px; height: 44px; flex-shrink: 0;
    border-radius: 12px;
  }
  #dial-grid.list-view .dial-label {
    font-size: 14px; text-align: left;
    max-width: none; flex: 1;
  }
  #dial-grid.list-view .group-grid { width: 32px; height: 32px; }

  /* ─── CONTEXT MENU ─── */
  #ctx-menu {
    position: fixed;
    background: rgba(28,30,40,.96);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 6px;
    min-width: 200px;
    z-index: 100;
    backdrop-filter: blur(20px);
    box-shadow: 0 16px 48px rgba(0,0,0,.6);
    display: none;
    animation: fadeIn .12s ease;
  }
  #ctx-menu.visible { display: block; }
  .ctx-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px;
    border-radius: 9px;
    cursor: pointer;
    font-size: 14px;
    transition: background .12s;
  }
  .ctx-item:hover { background: rgba(255,255,255,.08); }
  .ctx-item svg { width: 18px; height: 18px; flex-shrink: 0; opacity: .7; }
  .ctx-item.danger { color: #e05c5c; }
  .ctx-item.danger svg { opacity: 1; }

  /* ─── GROUP POPUP ─── */
  #group-popup {
    position: fixed;
    inset: 0;
    z-index: 80;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding-top: 80px;
  }
  #group-popup.visible { display: flex; }
  #group-popup-backdrop {
    position: absolute; inset: 0;
    background: rgba(0,0,0,.35);
    backdrop-filter: blur(4px);
  }
  #group-popup-box {
    position: relative;
    background: rgba(22,24,35,.96);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 20px;
    padding: 20px;
    min-width: 280px;
    max-width: 90vw;
    backdrop-filter: blur(24px);
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
    animation: popIn .18s ease;
  }
  #group-popup-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 14px;
  }
  #group-popup-name {
    text-align: center;
    font-size: 15px;
    font-weight: 500;
    color: var(--text-muted);
    padding-top: 6px;
    border-top: 1px solid var(--border);
  }
  #group-popup-box .dial-icon {
    width: 58px; height: 58px;
    border-radius: 14px;
  }
  #group-popup-box .dial-label { max-width: 58px; font-size: 10.5px; }
  #group-popup-add {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 58px; height: 58px;
    border-radius: 14px;
    border: 1.5px dashed rgba(255,255,255,.2);
    cursor: pointer;
    font-size: 24px;
    color: rgba(255,255,255,.3);
    transition: background .15s, color .15s;
  }
  #group-popup-add:hover { background: rgba(255,255,255,.06); color: rgba(255,255,255,.7); }

  /* ─── MODALS ─── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.5);
    backdrop-filter: blur(6px);
    display: none;
    align-items: flex-end;
    justify-content: center;
    padding: 0 0 0 0;
  }
  .modal-overlay.visible { display: flex; }

  .modal-box {
    background: #1c1e2a;
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 22px 22px 0 0;
    padding: 28px 24px 40px;
    width: 100%;
    max-width: 540px;
    animation: slideUp .22s ease;
  }
  @media (min-width: 600px) {
    .modal-overlay { align-items: center; }
    .modal-box { border-radius: 22px; max-width: 400px; }
  }

  .modal-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 24px;
    color: var(--text);
  }

  .field-group {
    position: relative;
    margin-bottom: 16px;
  }
  .field-group label {
    position: absolute;
    top: -9px; left: 12px;
    font-size: 11px;
    color: var(--text-muted);
    background: #1c1e2a;
    padding: 0 4px;
    letter-spacing: .04em;
  }
  .field-group input {
    width: 100%;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.14);
    border-radius: 10px;
    padding: 13px 14px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color .15s;
  }
  .field-group input:focus { border-color: var(--accent); }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 14px;
    margin-top: 26px;
  }
  .btn {
    padding: 10px 22px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: opacity .15s, transform .1s;
  }
  .btn:active { transform: scale(.97); }
  .btn-cancel { background: transparent; color: var(--text-muted); }
  .btn-cancel:hover { color: var(--text); }
  .btn-ok { background: var(--accent); color: #fff; }
  .btn-ok:hover { opacity: .88; }

  /* icon picker row */
  .icon-type-tabs {
    display: flex; gap: 8px; margin-bottom: 16px;
  }
  .icon-tab {
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: inherit;
    transition: background .15s, color .15s;
  }
  .icon-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* wallpaper picker */
  #wp-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    max-height: 40vh;
    overflow-y: auto;
    scrollbar-width: none;
    margin-top: 16px;
  }
  .wp-thumb {
    aspect-ratio: 16/10;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color .15s, transform .15s;
    position: relative;
  }
  .wp-thumb:hover { transform: scale(1.04); }
  .wp-thumb.selected { border-color: var(--accent); }
  .wp-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .wp-thumb .wp-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,.6);
    font-size: 10px;
    padding: 3px 5px;
    text-align: center;
    color: rgba(255,255,255,.7);
  }

  /* ─── ADD SPEED DIAL SCREEN ─── */
  #add-screen {
    position: fixed; inset: 0; z-index: 150;
    background: #0f1018;
    display: none;
    flex-direction: column;
    overflow-y: auto;
    scrollbar-width: none;
  }
  #add-screen.visible { display: flex; }
  #add-screen::-webkit-scrollbar { display: none; }

  .add-screen-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 20px 12px;
    position: sticky; top: 0;
    background: #0f1018;
    z-index: 5;
    border-bottom: 1px solid var(--border);
  }
  .back-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .back-btn svg { width: 20px; height: 20px; fill: var(--text); }
  .add-screen-header h2 { font-size: 20px; font-weight: 600; }

  .add-url-bar {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,.07);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 12px 18px;
    margin: 16px 20px 10px;
    cursor: text;
  }
  .add-url-bar svg { width: 20px; height: 20px; fill: var(--text-muted); flex-shrink: 0; }
  .add-url-bar input {
    background: transparent; border: none; outline: none;
    color: var(--text); font-size: 15px; font-family: inherit; flex: 1;
  }
  .add-url-bar input::placeholder { color: var(--text-muted); }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 16px 20px 10px;
  }

  .suggestions-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    padding: 0 20px;
  }
  .suggestion-item {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer; position: relative;
  }
  .suggestion-icon {
    width: 60px; height: 60px;
    border-radius: 16px;
    overflow: hidden;
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    border: 1px solid var(--border);
    transition: transform .15s;
  }
  .suggestion-item:hover .suggestion-icon { transform: scale(1.06); }
  .suggestion-icon img { width: 100%; height: 100%; object-fit: cover; }
  .suggestion-icon .s-emoji { font-size: 28px; }
  .s-add-badge {
    position: absolute; bottom: -4px; right: -4px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: #fff; font-weight: 700;
    border: 2px solid #0f1018;
  }
  .suggestion-label {
    font-size: 11px; color: var(--text-muted);
    text-align: center; max-width: 64px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* categories */
  .categories-row {
    display: flex; gap: 12px;
    padding: 0 20px;
    overflow-x: auto; scrollbar-width: none;
  }
  .categories-row::-webkit-scrollbar { display: none; }
  .category-card {
    min-width: 120px; height: 90px;
    border-radius: 16px;
    display: flex; flex-direction: column;
    justify-content: space-between;
    padding: 12px;
    cursor: pointer;
    position: relative; overflow: hidden;
    transition: transform .15s;
  }
  .category-card:hover { transform: scale(1.04); }
  .category-card span { font-size: 14px; font-weight: 600; z-index: 1; }
  .category-card .cat-icon { font-size: 32px; align-self: flex-end; z-index: 1; opacity: .7; }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeIn { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: scale(1); } }
  @keyframes popIn  { from { opacity: 0; transform: scale(.92) translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  /* ─── SETTINGS BTN ─── */
  #settings-btn {
    position: fixed;
    bottom: 20px; right: 16px;
    width: 42px; height: 42px;
    border-radius: 50%;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.12);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 10;
    backdrop-filter: blur(10px);
    transition: background .15s;
  }
  #settings-btn:hover { background: rgba(255,255,255,.16); }
  #settings-btn svg { width: 20px; height: 20px; fill: rgba(255,255,255,.6); }

  /* toast */
  #toast {
    position: fixed;
    bottom: 70px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: rgba(30,32,44,.96);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 9px 20px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    transition: opacity .2s, transform .2s;
    pointer-events: none;
    z-index: 300;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="wallpaper"></div>

<div id="app">
  <div id="grid-wrap">
    <div id="dial-grid"></div>
  </div>
</div>

<!-- View toggles -->
<div id="view-toggles">
  <div class="view-btn active" id="btn-grid" onclick="setView('grid')" title="Grid view">
    <svg viewBox="0 0 20 20"><rect x="2" y="2" width="7" height="7" rx="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5"/></svg>
  </div>
  <div class="view-btn" id="btn-list" onclick="setView('list')" title="List view">
    <svg viewBox="0 0 20 20"><rect x="2" y="3" width="16" height="3" rx="1.5"/><rect x="2" y="8.5" width="16" height="3" rx="1.5"/><rect x="2" y="14" width="16" height="3" rx="1.5"/></svg>
  </div>
</div>

<!-- Settings button -->
<div id="settings-btn" onclick="openWallpaperPicker()" title="Change wallpaper">
  <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93V18c0-.55.45-1 1-1s1 .45 1 1v1.93c-2.67-.46-4.8-2.59-5.26-5.26H8c.55 0 1-.45 1-1s-.45-1-1-1H6.07C6.53 9.41 9.41 6.53 12 6.07V8c0 .55.45 1 1 1s1-.45 1-1V6.07c2.59.46 5.47 3.34 5.93 5.93H18c-.55 0-1 .45-1 1s.45 1 1 1h1.93C19.47 16.59 16.59 19.47 11 19.93z"/><circle cx="12" cy="12" r="2.5"/></svg>
</div>

<!-- Context Menu -->
<div id="ctx-menu">
  <div class="ctx-item" id="ctx-open">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 19H5V5h7V3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
    Open in new tab
  </div>
  <div class="ctx-item" id="ctx-edit">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
    Edit
  </div>
  <div class="ctx-item danger" id="ctx-delete">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19a2 2 0 002 2h8a2 2 0 002-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
    Delete
  </div>
</div>

<!-- Group popup -->
<div id="group-popup">
  <div id="group-popup-backdrop" onclick="closeGroupPopup()"></div>
  <div id="group-popup-box">
    <div id="group-popup-grid"></div>
    <div id="group-popup-name"></div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal-box">
    <div class="modal-title">Edit</div>
    <div class="field-group">
      <label>Name</label>
      <input type="text" id="edit-name" placeholder="Site name">
    </div>
    <div class="field-group">
      <label>Address</label>
      <input type="url" id="edit-url" placeholder="https://...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-ok" onclick="saveEdit()">OK</button>
    </div>
  </div>
</div>

<!-- Add Icon Modal (standalone) -->
<div class="modal-overlay" id="add-modal">
  <div class="modal-box">
    <div class="modal-title">Add Speed Dial</div>
    <div class="field-group">
      <label>Name</label>
      <input type="text" id="add-name" placeholder="Site name">
    </div>
    <div class="field-group">
      <label>Address</label>
      <input type="url" id="add-url" placeholder="https://...">
    </div>
    <div style="margin-bottom:8px; font-size:13px; color:var(--text-muted)">Icon</div>
    <div class="icon-type-tabs">
      <button class="icon-tab active" onclick="setIconTab('favicon',this)">Auto favicon</button>
      <button class="icon-tab" onclick="setIconTab('emoji',this)">Emoji</button>
    </div>
    <div id="emoji-picker-row" style="display:none">
      <div class="field-group" style="margin-bottom:0">
        <label>Emoji</label>
        <input type="text" id="add-emoji" placeholder="e.g. 🎬" maxlength="2">
      </div>
    </div>
    <div style="margin-top:14px; font-size:13px; color:var(--text-muted); margin-bottom:6px">Add to</div>
    <div class="icon-type-tabs" id="group-tabs" style="flex-wrap:wrap"></div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-ok" onclick="saveAdd()">Add</button>
    </div>
  </div>
</div>

<!-- Wallpaper Picker Modal -->
<div class="modal-overlay" id="wp-modal">
  <div class="modal-box">
    <div class="modal-title">Wallpaper</div>
    <div style="font-size:13px; color:var(--text-muted); margin-bottom:8px">Choose a preset or enter a custom image URL</div>
    <div class="field-group">
      <label>Custom URL</label>
      <input type="url" id="wp-custom-url" placeholder="https://..." oninput="previewCustomWp(this.value)">
    </div>
    <div id="wp-grid"></div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeWpModal()">Close</button>
    </div>
  </div>
</div>

<!-- Add Speed Dial Screen -->
<div id="add-screen">
  <div class="add-screen-header">
    <div class="back-btn" onclick="closeAddScreen()">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </div>
    <h2>Add speed dial</h2>
  </div>

  <div class="add-url-bar">
    <svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z" fill="none" stroke="currentColor" stroke-width="2"/></svg>
    <input type="url" id="screen-url-input" placeholder="Add website" onkeydown="if(event.key==='Enter')addFromScreenUrl()">
  </div>

  <div class="section-title">Popular sites</div>
  <div class="suggestions-grid" id="popular-grid"></div>

  <div class="section-title">Categories</div>
  <div class="categories-row" id="categories-row"></div>

  <div class="section-title" style="margin-top:16px">Quick add (emoji)</div>
  <div class="suggestions-grid" id="emoji-grid"></div>
  <div style="height:40px"></div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════

const WALLPAPERS = [
  { label: 'Space Hat', url: 'https://wallpapercave.com/wp/wp2162423.jpg' },
  { label: 'Galaxy', url: 'https://wallpapercave.com/wp/wp4164505.jpg' },
  { label: 'Aurora', url: 'https://wallpapercave.com/wp/wp3302300.jpg' },
  { label: 'Deep Sea', url: 'https://wallpapercave.com/wp/wp4668564.jpg' },
  { label: 'Forest', url: 'https://images.unsplash.com/photo-1448375240586-882707db888b?w=1200' },
  { label: 'Mountains', url: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200' },
  { label: 'City Night', url: 'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=1200' },
  { label: 'Abstract', url: 'https://images.unsplash.com/photo-1557682224-5b8590cd9ec5?w=1200' },
  { label: 'Dark Minimal', url: '' },
];

const POPULAR = [
  { name: 'Google', url: 'https://www.google.com', favicon: 'https://www.google.com/favicon.ico' },
  { name: 'YouTube', url: 'https://www.youtube.com', favicon: 'https://www.youtube.com/favicon.ico' },
  { name: 'Reddit', url: 'https://www.reddit.com', favicon: 'https://www.reddit.com/favicon.ico' },
  { name: 'X', url: 'https://x.com', favicon: 'https://x.com/favicon.ico' },
  { name: 'GitHub', url: 'https://github.com', favicon: 'https://github.com/favicon.ico' },
  { name: 'Wikipedia', url: 'https://wikipedia.org', favicon: 'https://wikipedia.org/favicon.ico' },
  { name: 'Amazon', url: 'https://amazon.com', favicon: 'https://amazon.com/favicon.ico' },
  { name: 'Instagram', url: 'https://instagram.com', favicon: 'https://instagram.com/favicon.ico' },
];

const CATEGORIES = [
  { name: 'Gaming', color: '#6b5a2e', bg: '#4a3f1e', emoji: '🎮' },
  { name: 'Finance', color: '#1e4a3f', bg: '#123028', emoji: '📈' },
  { name: 'Social', color: '#4a1e2e', bg: '#30121e', emoji: '👥' },
  { name: 'Travel', color: '#1e2e4a', bg: '#12203a', emoji: '✈️' },
  { name: 'News', color: '#3a1e1e', bg: '#2a1212', emoji: '📰' },
];

const QUICK_EMOJIS = [
  { name: 'Movies', emoji: '🎬', url: '' },
  { name: 'Music', emoji: '🎵', url: '' },
  { name: 'Books', emoji: '📚', url: '' },
  { name: 'Sports', emoji: '⚽', url: '' },
];

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════

let dials = JSON.parse(localStorage.getItem('sd_dials') || 'null') || [
  { id: 'g1', type: 'group', name: 'Watch', items: [
    { id:'i1', name:'YouTube', url:'https://youtube.com', favicon:'https://youtube.com/favicon.ico' },
    { id:'i2', name:'Twitch', url:'https://twitch.tv', favicon:'https://twitch.tv/favicon.ico' },
    { id:'i3', name:'Netflix', url:'https://netflix.com', favicon:'https://netflix.com/favicon.ico' },
    { id:'i4', name:'Instagram', url:'https://instagram.com', favicon:'https://instagram.com/favicon.ico' },
  ]},
  { id: 's1', type:'single', name:'AniList', url:'https://anilist.co', favicon:'https://anilist.co/favicon.ico' },
  { id: 'g2', type:'group', name:'Read', items:[
    { id:'i5', name:'Reddit', url:'https://reddit.com', favicon:'https://reddit.com/favicon.ico' },
    { id:'i6', name:'Wikipedia', url:'https://wikipedia.org', favicon:'https://wikipedia.org/favicon.ico' },
  ]},
  { id: 's2', type:'single', name:'GitHub', url:'https://github.com', favicon:'https://github.com/favicon.ico' },
  { id: 's3', type:'single', name:'Search', url:'https://google.com', favicon:'https://google.com/favicon.ico', emoji:'' },
  { id: 's4', type:'single', name:'BirdsEyes', url:'https://birdseyes.app', emoji:'🦉' },
];

let wallpaper = localStorage.getItem('sd_wp') || '';
let view = localStorage.getItem('sd_view') || 'grid';

let ctxTarget = null; // { dialId, parentGroupId }
let editTarget = null;
let addGroupTarget = null; // group id or 'root'
let iconTab = 'favicon';

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════

function init() {
  applyWallpaper(wallpaper);
  renderGrid();
  setView(view, true);
  buildWpGrid();
  buildPopularGrid();
  buildCategories();
  buildEmojiGrid();
  buildGroupTabs();
}

// ══════════════════════════════════════════════
//  WALLPAPER
// ══════════════════════════════════════════════

function applyWallpaper(url) {
  const wp = document.getElementById('wallpaper');
  if (url) {
    wp.style.setProperty('--wp-url', `url("${url}")`);
    wp.style.opacity = '1';
  } else {
    wp.style.removeProperty('--wp-url');
    wp.style.opacity = '0';
  }
}

function buildWpGrid() {
  const grid = document.getElementById('wp-grid');
  grid.innerHTML = '';
  WALLPAPERS.forEach(wp => {
    const div = document.createElement('div');
    div.className = 'wp-thumb' + (wallpaper === wp.url ? ' selected' : '');
    if (wp.url) {
      div.innerHTML = `<img src="${wp.url}" loading="lazy"><div class="wp-label">${wp.label}</div>`;
    } else {
      div.style.background = '#0a0c12';
      div.innerHTML = `<div class="wp-label" style="position:static;padding:30px 0;text-align:center;font-size:13px;color:var(--text-muted)">${wp.label}</div>`;
    }
    div.onclick = () => {
      selectWp(wp.url);
      document.querySelectorAll('.wp-thumb').forEach(t => t.classList.remove('selected'));
      div.classList.add('selected');
    };
    grid.appendChild(div);
  });
}

function selectWp(url) {
  wallpaper = url;
  localStorage.setItem('sd_wp', url);
  applyWallpaper(url);
  document.getElementById('wp-custom-url').value = url;
}

function previewCustomWp(url) {
  if (!url) return;
  wallpaper = url;
  localStorage.setItem('sd_wp', url);
  applyWallpaper(url);
  document.querySelectorAll('.wp-thumb').forEach(t => t.classList.remove('selected'));
}

function openWallpaperPicker() { document.getElementById('wp-modal').classList.add('visible'); }
function closeWpModal() { document.getElementById('wp-modal').classList.remove('visible'); }

// ══════════════════════════════════════════════
//  VIEW
// ══════════════════════════════════════════════

function setView(v, silent) {
  view = v;
  if (!silent) localStorage.setItem('sd_view', v);
  const grid = document.getElementById('dial-grid');
  grid.classList.toggle('list-view', v === 'list');
  document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
  document.getElementById('btn-list').classList.toggle('active', v === 'list');
}

// ══════════════════════════════════════════════
//  RENDER GRID
// ══════════════════════════════════════════════

function save() { localStorage.setItem('sd_dials', JSON.stringify(dials)); }

function renderGrid() {
  const grid = document.getElementById('dial-grid');
  grid.innerHTML = '';
  dials.forEach(dial => {
    grid.appendChild(createDialEl(dial));
  });
  // Add button
  const addEl = document.createElement('div');
  addEl.className = 'dial-item add-btn';
  addEl.innerHTML = `<div class="dial-icon"><span class="plus-icon">+</span></div><span class="dial-label">Add</span>`;
  addEl.onclick = openAddScreen;
  grid.appendChild(addEl);
}

function getFaviconUrl(url, fallback) {
  if (fallback) return null;
  try {
    const u = new URL(url);
    return `https://www.google.com/s2/favicons?domain=${u.hostname}&sz=64`;
  } catch { return null; }
}

function createIconContent(dial) {
  if (dial.emoji) return `<span class="emoji-icon">${dial.emoji}</span>`;
  const fav = dial.favicon || getFaviconUrl(dial.url);
  if (fav) return `<img class="favicon" src="${fav}" onerror="this.parentNode.innerHTML='<span class=\\'emoji-icon\\'>🌐</span>'" loading="lazy">`;
  return `<span class="emoji-icon">🌐</span>`;
}

function createGroupContent(group) {
  const items = group.items.slice(0, 4);
  let html = '<div class="group-grid">';
  for (let i = 0; i < 4; i++) {
    const it = items[i];
    if (it) {
      if (it.emoji) {
        html += `<div class="group-grid-cell"><span class="cell-emoji">${it.emoji}</span></div>`;
      } else {
        const fav = it.favicon || getFaviconUrl(it.url);
        html += `<div class="group-grid-cell">${fav ? `<img src="${fav}" onerror="this.style.display='none'">` : `<span class="cell-letter">${it.name.charAt(0)}</span>`}</div>`;
      }
    } else {
      html += '<div class="group-grid-cell"></div>';
    }
  }
  html += '</div>';
  return html;
}

function createDialEl(dial, parentId) {
  const el = document.createElement('div');
  el.className = 'dial-item';
  el.dataset.id = dial.id;
  if (parentId) el.dataset.parent = parentId;

  const icon = document.createElement('div');
  icon.className = 'dial-icon';

  if (dial.type === 'group') {
    icon.innerHTML = createGroupContent(dial);
    el.onclick = (e) => { e.stopPropagation(); openGroupPopup(dial); };
  } else {
    icon.innerHTML = createIconContent(dial);
    el.onclick = (e) => { e.stopPropagation(); window.open(dial.url, '_blank'); };
  }

  const label = document.createElement('span');
  label.className = 'dial-label';
  label.textContent = dial.name;

  el.appendChild(icon);
  el.appendChild(label);

  // Context menu
  el.addEventListener('contextmenu', (e) => { e.preventDefault(); showCtxMenu(e, dial.id, parentId); });
  el.addEventListener('pointerdown', longPress(el, dial.id, parentId));

  return el;
}

// long press for touch
function longPress(el, id, parentId) {
  let timer;
  return (e) => {
    if (e.pointerType !== 'touch') return;
    timer = setTimeout(() => {
      showCtxMenu(e, id, parentId);
    }, 500);
    const cancel = () => clearTimeout(timer);
    el.addEventListener('pointerup', cancel, { once: true });
    el.addEventListener('pointermove', cancel, { once: true });
  };
}

// ══════════════════════════════════════════════
//  CONTEXT MENU
// ══════════════════════════════════════════════

function showCtxMenu(e, id, parentId) {
  ctxTarget = { id, parentId };
  const menu = document.getElementById('ctx-menu');
  menu.classList.add('visible');

  // find dial
  const dial = findDial(id, parentId);
  const isGroup = dial && dial.type === 'group';
  document.getElementById('ctx-open').style.display = isGroup ? 'none' : 'flex';

  let x = e.clientX || (e.touches && e.touches[0].clientX) || 0;
  let y = e.clientY || (e.touches && e.touches[0].clientY) || 0;
  const mw = 200, mh = 130;
  if (x + mw > window.innerWidth) x = window.innerWidth - mw - 8;
  if (y + mh > window.innerHeight) y = y - mh;
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
}

function findDial(id, parentId) {
  if (parentId) {
    const parent = dials.find(d => d.id === parentId);
    return parent && parent.items.find(i => i.id === id);
  }
  return dials.find(d => d.id === id);
}

function hideCtxMenu() { document.getElementById('ctx-menu').classList.remove('visible'); }

document.getElementById('ctx-open').onclick = () => {
  const d = findDial(ctxTarget.id, ctxTarget.parentId);
  if (d) window.open(d.url, '_blank');
  hideCtxMenu();
};

document.getElementById('ctx-edit').onclick = () => {
  const d = findDial(ctxTarget.id, ctxTarget.parentId);
  if (!d) return hideCtxMenu();
  editTarget = { ...ctxTarget };
  document.getElementById('edit-name').value = d.name;
  document.getElementById('edit-url').value = d.url || '';
  document.getElementById('edit-modal').classList.add('visible');
  hideCtxMenu();
};

document.getElementById('ctx-delete').onclick = () => {
  deleteDial(ctxTarget.id, ctxTarget.parentId);
  hideCtxMenu();
};

function deleteDial(id, parentId) {
  if (parentId) {
    const parent = dials.find(d => d.id === parentId);
    if (parent) parent.items = parent.items.filter(i => i.id !== id);
    if (parent && parent.items.length === 0) dials = dials.filter(d => d.id !== parentId);
  } else {
    dials = dials.filter(d => d.id !== id);
  }
  save();
  renderGrid();
  closeGroupPopup();
  toast('Deleted');
}

// ══════════════════════════════════════════════
//  EDIT MODAL
// ══════════════════════════════════════════════

function closeEditModal() { document.getElementById('edit-modal').classList.remove('visible'); }

function saveEdit() {
  if (!editTarget) return;
  const name = document.getElementById('edit-name').value.trim();
  const url = document.getElementById('edit-url').value.trim();
  if (!name) return;
  const d = findDial(editTarget.id, editTarget.parentId);
  if (d) {
    d.name = name;
    if (url) { d.url = url; d.favicon = null; }
  }
  save(); renderGrid(); closeEditModal();
  toast('Saved');
}

// ══════════════════════════════════════════════
//  GROUP POPUP
// ══════════════════════════════════════════════

let currentGroup = null;

function openGroupPopup(group) {
  currentGroup = group;
  const popup = document.getElementById('group-popup');
  const grid = document.getElementById('group-popup-grid');
  const nameEl = document.getElementById('group-popup-name');
  grid.innerHTML = '';
  group.items.forEach(item => {
    const wrap = document.createElement('div');
    wrap.style.display = 'flex'; wrap.style.flexDirection = 'column'; wrap.style.alignItems = 'center'; wrap.style.gap = '6px';
    const el = createDialEl(item, group.id);
    wrap.appendChild(el);
    grid.appendChild(wrap);
  });
  // add to group
  const addBtn = document.createElement('div');
  addBtn.id = 'group-popup-add';
  addBtn.textContent = '+';
  addBtn.onclick = () => { closeGroupPopup(); openAddModal(group.id); };
  grid.appendChild(addBtn);
  nameEl.textContent = group.name;
  popup.classList.add('visible');
}

function closeGroupPopup() {
  document.getElementById('group-popup').classList.remove('visible');
  currentGroup = null;
}

// ══════════════════════════════════════════════
//  ADD MODAL
// ══════════════════════════════════════════════

function openAddModal(groupId) {
  addGroupTarget = groupId || 'root';
  buildGroupTabs();
  document.getElementById('add-name').value = '';
  document.getElementById('add-url').value = '';
  document.getElementById('add-emoji').value = '';
  setIconTab('favicon', document.querySelector('.icon-tab'));
  document.getElementById('add-modal').classList.add('visible');
}

function closeAddModal() { document.getElementById('add-modal').classList.remove('visible'); }

function setIconTab(tab, btn) {
  iconTab = tab;
  document.querySelectorAll('.icon-tab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('emoji-picker-row').style.display = tab === 'emoji' ? 'block' : 'none';
}

function buildGroupTabs() {
  const container = document.getElementById('group-tabs');
  if (!container) return;
  container.innerHTML = '';
  const rootBtn = document.createElement('button');
  rootBtn.className = 'icon-tab' + (addGroupTarget === 'root' || !addGroupTarget ? ' active' : '');
  rootBtn.textContent = 'Home';
  rootBtn.onclick = () => { addGroupTarget = 'root'; document.querySelectorAll('#group-tabs .icon-tab').forEach(b=>b.classList.remove('active')); rootBtn.classList.add('active'); };
  container.appendChild(rootBtn);

  const newGroupBtn = document.createElement('button');
  newGroupBtn.className = 'icon-tab' + (addGroupTarget === 'new' ? ' active' : '');
  newGroupBtn.textContent = '+ New group';
  newGroupBtn.onclick = () => { addGroupTarget = 'new'; document.querySelectorAll('#group-tabs .icon-tab').forEach(b=>b.classList.remove('active')); newGroupBtn.classList.add('active'); };
  container.appendChild(newGroupBtn);

  dials.filter(d => d.type === 'group').forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'icon-tab' + (addGroupTarget === g.id ? ' active' : '');
    btn.textContent = g.name;
    btn.onclick = () => { addGroupTarget = g.id; document.querySelectorAll('#group-tabs .icon-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); };
    container.appendChild(btn);
  });
}

function saveAdd() {
  const name = document.getElementById('add-name').value.trim();
  const url = document.getElementById('add-url').value.trim();
  const emoji = document.getElementById('add-emoji').value.trim();
  if (!name) { toast('Name required'); return; }

  const newItem = {
    id: 'i' + Date.now(),
    name,
    url: url || '#',
    favicon: url ? null : null,
    ...(emoji ? { emoji } : {}),
  };

  if (addGroupTarget === 'new') {
    dials.push({ id: 'g' + Date.now(), type: 'group', name, items: [{ ...newItem, id: 'i' + Date.now() + 1 }] });
  } else if (addGroupTarget === 'root' || !addGroupTarget) {
    dials.push({ ...newItem, type: 'single' });
  } else {
    const g = dials.find(d => d.id === addGroupTarget);
    if (g) g.items.push(newItem);
  }

  save(); renderGrid(); closeAddModal();
  toast('Added!');
}

// ══════════════════════════════════════════════
//  ADD SCREEN
// ══════════════════════════════════════════════

function openAddScreen() {
  document.getElementById('add-screen').classList.add('visible');
  setTimeout(() => document.getElementById('screen-url-input').focus(), 100);
}
function closeAddScreen() { document.getElementById('add-screen').classList.remove('visible'); }

function addFromScreenUrl() {
  const url = document.getElementById('screen-url-input').value.trim();
  if (!url) return;
  try { new URL(url); } catch { toast('Invalid URL'); return; }
  const name = new URL(url).hostname.replace('www.', '');
  dials.push({ id: 'i' + Date.now(), type: 'single', name, url });
  save(); renderGrid(); closeAddScreen();
  toast('Added!');
}

function buildPopularGrid() {
  const grid = document.getElementById('popular-grid');
  grid.innerHTML = '';
  POPULAR.forEach(site => {
    const el = document.createElement('div');
    el.className = 'suggestion-item';
    el.innerHTML = `
      <div class="suggestion-icon">
        <img src="${site.favicon}" onerror="this.parentNode.innerHTML='<span class=s-emoji>🌐</span>'" loading="lazy">
        <div class="s-add-badge">+</div>
      </div>
      <span class="suggestion-label">${site.name}</span>
    `;
    el.onclick = () => {
      dials.push({ id:'i'+Date.now(), type:'single', name:site.name, url:site.url, favicon:site.favicon });
      save(); renderGrid(); closeAddScreen();
      toast(`Added ${site.name}`);
    };
    grid.appendChild(el);
  });
}

function buildCategories() {
  const row = document.getElementById('categories-row');
  row.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const card = document.createElement('div');
    card.className = 'category-card';
    card.style.background = `linear-gradient(135deg, ${cat.bg}, ${cat.color})`;
    card.innerHTML = `<span>${cat.name}</span><span class="cat-icon">${cat.emoji}</span>`;
    row.appendChild(card);
  });
}

function buildEmojiGrid() {
  const grid = document.getElementById('emoji-grid');
  grid.innerHTML = '';
  QUICK_EMOJIS.forEach(item => {
    const el = document.createElement('div');
    el.className = 'suggestion-item';
    el.innerHTML = `
      <div class="suggestion-icon">
        <span class="s-emoji">${item.emoji}</span>
        <div class="s-add-badge">+</div>
      </div>
      <span class="suggestion-label">${item.name}</span>
    `;
    el.onclick = () => {
      document.getElementById('screen-url-input').value = '';
      closeAddScreen();
      openAddModal('root');
      document.getElementById('add-name').value = item.name;
      document.getElementById('add-emoji').value = item.emoji;
      setIconTab('emoji', document.querySelectorAll('#add-modal .icon-tab')[1]);
    };
    grid.appendChild(el);
  });
}

// ══════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Close context menu on outside click
document.addEventListener('click', (e) => {
  const menu = document.getElementById('ctx-menu');
  if (menu.classList.contains('visible') && !menu.contains(e.target)) hideCtxMenu();
});

// Close modals on backdrop click
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', (e) => { if (e.target === m) m.classList.remove('visible'); });
});

// Enter key in edit fields
document.getElementById('edit-url').addEventListener('keydown', e => { if (e.key === 'Enter') saveEdit(); });
document.getElementById('add-url').addEventListener('keydown', e => { if (e.key === 'Enter') saveAdd(); });

// ══════════════════════════════════════════════
init();
</script>
</body>
</html>
